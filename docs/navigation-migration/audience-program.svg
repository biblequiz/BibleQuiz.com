<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#f5fbfa"/>
  <rect width="1440" height="76" fill="#fff"/>
  <line x1="0" y1="76" x2="1440" y2="76" stroke="#d7e6e4"/>
  <rect x="42" y="18" width="42" height="42" rx="10" fill="#005958"/>
  <text x="63" y="45" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#fff">BQ</text>
  <text x="96" y="46" font-family="Arial" font-size="22" font-weight="700" fill="#173c3b">BibleQuiz.com</text>
  <g font-family="Arial" font-size="16" font-weight="600" fill="#244b49">
    <text x="322" y="46">Events &amp; Scores</text><text x="492" y="46">Programs⌄</text><text x="604" y="46">For You⌄</text><text x="706" y="46">Resources⌄</text>
  </g>
  <rect x="860" y="21" width="100" height="38" rx="8" fill="#005958"/><text x="910" y="46" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#fff">Register</text>
  <text x="1324" y="46" text-anchor="end" font-family="Arial" font-size="15" font-weight="700" fill="#244b49">Sign In</text>
  <text x="82" y="126" font-family="Arial" font-size="14" fill="#607c7a">For You  /  Parents</text>
  <text x="82" y="190" font-family="Arial" font-size="42" font-weight="700" fill="#173c3b">Resources for parents</text>
  <text x="82" y="232" font-family="Arial" font-size="19" fill="#587371">Choose the Program your family is involved with.</text>
  <rect x="82" y="282" width="610" height="310" rx="16" fill="#fff" stroke="#d7e6e4"/>
  <circle cx="156" cy="358" r="42" fill="#efb63c"/>
  <text x="156" y="367" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#312500">JBQ</text>
  <text x="220" y="350" font-family="Arial" font-size="27" font-weight="700" fill="#173c3b">Junior Bible Quiz</text>
  <text x="220" y="382" font-family="Arial" font-size="16" fill="#587371">The primary parent path</text>
  <text x="122" y="444" font-family="Arial" font-size="16" fill="#3f5d5b">Understand the Program, find a team, register,</text>
  <text x="122" y="470" font-family="Arial" font-size="16" fill="#3f5d5b">prepare for events, and support your Quizzer.</text>
  <rect x="122" y="510" width="188" height="48" rx="8" fill="#005958"/>
  <text x="216" y="540" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700" fill="#fff">Continue with JBQ</text>
  <rect x="724" y="282" width="610" height="310" rx="16" fill="#fff" stroke="#d7e6e4"/>
  <circle cx="798" cy="358" r="42" fill="#3a77bd"/>
  <text x="798" y="367" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#fff">TBQ</text>
  <text x="862" y="350" font-family="Arial" font-size="27" font-weight="700" fill="#173c3b">Teen Bible Quiz</text>
  <text x="862" y="382" font-family="Arial" font-size="16" fill="#587371">A focused parent path</text>
  <text x="764" y="444" font-family="Arial" font-size="16" fill="#3f5d5b">Follow your Quizzer’s events, schedules, and</text>
  <text x="764" y="470" font-family="Arial" font-size="16" fill="#3f5d5b">current scores without navigating the full archive.</text>
  <rect x="764" y="510" width="188" height="48" rx="8" fill="#fff" stroke="#005958"/>
  <text x="858" y="540" text-anchor="middle" font-family="Arial" font-size="15" font-weight="700" fill="#005958">Continue with TBQ</text>
  <rect x="82" y="638" width="1252" height="118" rx="14" fill="#e8f3f2"/>
  <text x="116" y="680" font-family="Arial" font-size="18" font-weight="700" fill="#173c3b">Not sure which Program?</text>
  <text x="116" y="714" font-family="Arial" font-size="15" fill="#587371">JBQ is generally for grades 1–6. TBQ is generally for middle and high school students.</text>
  <text x="116" y="740" font-family="Arial" font-size="15" font-weight="700" fill="#006b69">Compare Programs →</text>
</svg>
