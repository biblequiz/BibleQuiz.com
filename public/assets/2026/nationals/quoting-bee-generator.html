    <body>
        <div class="shell">
            <div class="no-print">
                <h1>Bible Quiz Quoting Bee Generator</h1>
                <p class="sub">
                    New Living Translation &nbsp;&middot;&nbsp; Year 7:
                    Galatians, Ephesians, Philippians, Colossians, Philemon
                </p>
            </div>
            <div class="card no-print">
                <div class="card-title">Quick Presets</div>
                <div class="preset-grid" id="preset-grid"></div>
            </div>
            <div class="card no-print">
                <div class="card-title">Books</div>
                <div class="book-grid" id="book-grid"></div>
                <div class="chaprow">
                    <label>Chapter range (single book only):</label>
                    <input
                        type="number"
                        id="chap-from"
                        placeholder="from"
                        min="1"
                    /><span style="color: #aaa; font-size: 13px">&ndash;</span>
                    <input
                        type="number"
                        id="chap-to"
                        placeholder="to"
                        min="1"
                    />
                </div>
            </div>
            <div class="card no-print">
                <div class="card-title">Options</div>
                <div class="row">
                    <div class="cg">
                        <label>Min words</label
                        ><input
                            type="number"
                            id="minw"
                            value="1"
                            min="1"
                            max="300"
                        />
                    </div>
                    <div class="cg">
                        <label>Max words</label
                        ><input
                            type="number"
                            id="maxw"
                            value="50"
                            min="1"
                            max="300"
                        />
                    </div>
                    <div class="cg">
                        <label>Gap i vs i+1 (&ge; verses apart)</label
                        ><input
                            type="number"
                            id="gap1"
                            value="50"
                            min="1"
                            max="999"
                        />
                    </div>
                    <div class="cg">
                        <label>Gap i vs i+2 (&ge; verses apart)</label
                        ><input
                            type="number"
                            id="gap2"
                            value="25"
                            min="1"
                            max="999"
                        />
                    </div>
                    <div class="cg">
                        <label>Quiz title</label
                        ><input
                            type="text"
                            id="qtitle"
                            placeholder="e.g. District Tournament 2026"
                        />
                    </div>
                </div>
                <div style="margin-top: 14px">
                    <button
                        class="genbtn"
                        id="genbtn"
                        onclick="generate()"
                        type="button"
                    >
                        Generate sheet
                    </button>
                    <button
                        class="printbtn no-print"
                        id="printbtn"
                        onclick="window.print()"
                        style="display: none"
                        type="button"
                    >
                        &#9112; Print / Save PDF
                    </button>
                </div>
            </div>
            <div id="results"></div>
        </div>

                philippians: [
                    [
                        1,
                        1,
                        "This letter is from Paul and Timothy, slaves of Christ Jesus. I am writing to all of God\u2019s holy people in Philippi who belong to Christ Jesus, including the church leaders and deacons.",

                    [
                        1,

                    [
                        1,

                    [
                        1,

                    ],
                    [
                        1,
                        5,

                    [
                        1,
                        6,

                    [

                    [

                    if (!stuck) return result;
                }
                var fb = shuffleArray(pool);
                fb.isFallback = true;
                return fb;
            }
            function renderPresets() {
                var g = document.getElementById("preset-grid");
                g.innerHTML = "";
                for (var i = 0; i < PRESETS.length; i++) {
                    (function (p, idx) {
                        var btn = document.createElement("button");
                        btn.className =
                            "pbtn" + (activePreset === idx ? " active" : "");
                        btn.textContent = p.label;
                        btn.onclick = function () {
                            activePreset = idx;
                            if (p.books) {
                                selectedBooks = p.books.slice();
                                document.getElementById("chap-from").value = "";
                                document.getElementById("chap-to").value = "";
                            }
                            renderPresets();
                            renderBooks();
                        };
                        g.appendChild(btn);
                    })(PRESETS[i], i);
                }
            }
            function renderBooks() {
                var g = document.getElementById("book-grid");
                g.innerHTML = "";
                for (var bi = 0; bi < BOOK_ORDER.length; bi++) {
                    (function (bk) {
                        var on = inSelected(bk);
                        var lbl = document.createElement("label");
                        lbl.className = "bk" + (on ? " on" : "");
                        var cb = document.createElement("input");
                        cb.type = "checkbox";
                        cb.checked = on;
                        cb.onchange = function () {
                            if (cb.checked) {
                                if (!inSelected(bk)) selectedBooks.push(bk);
                            } else {
                                var idx = selectedBooks.indexOf(bk);
                                if (idx !== -1) selectedBooks.splice(idx, 1);
                            }
                            activePreset = 8;
                            renderPresets();
                            lbl.className =
                                "bk" + (inSelected(bk) ? " on" : "");
                        };
                        lbl.appendChild(cb);
                        lbl.appendChild(
                            document.createTextNode(" " + BOOKS_META[bk].name),
                        );
                        g.appendChild(lbl);
                    })(BOOK_ORDER[bi]);
                }
            }
            function generate() {
                var btn = document.getElementById("genbtn");
                btn.disabled = true;
                btn.textContent = "Shuffling...";
                setTimeout(function () {
                    try {
                        doGenerate();
                    } catch (err) {
                        document.getElementById("results").innerHTML =
                            '<div class="warn">Error: ' +
                            err.message +
                            "</div>";
                    }
                    btn.disabled = false;
                    btn.textContent = "Regenerate";
                }, 20);
            }
            function doGenerate() {
                var minW = parseInt(document.getElementById("minw").value) || 1;
                var maxW =
                    parseInt(document.getElementById("maxw").value) || 50;
                var gap1 =
                    parseInt(document.getElementById("gap1").value) || 50;
                var gap2 =
                    parseInt(document.getElementById("gap2").value) || 25;
                var title = document.getElementById("qtitle").value.trim();
                var chapFrom =
                    parseInt(document.getElementById("chap-from").value) || 0;
                var chapTo =
                    parseInt(document.getElementById("chap-to").value) || 999;
                var single = selectedBooks.length === 1;
                var res = document.getElementById("results");
                if (selectedBooks.length === 0) {
                    res.innerHTML =
                        '<div class="warn">Please select at least one book.</div>';
                    return;
                }
                var pool = [];
                for (var i = 0; i < VERSE_INDEX.length; i++) {
                    var v = VERSE_INDEX[i];
                    if (!inSelected(v.book)) continue;
                    if (single && chapFrom > 0 && v.ch < chapFrom) continue;
                    if (single && chapTo < 999 && v.ch > chapTo) continue;
                    var wds = wordCount(v.text);
                    if (wds < minW || wds > maxW) continue;
                    pool.push(v);
                }
                if (pool.length === 0) {
                    res.innerHTML =
                        '<div class="warn">No verses matched your filters. Try adjusting the word count range (currently ' +
                        minW +
                        "-" +
                        maxW +
                        " words).</div>";
                    return;
                }
                var shuffled = shuffleWithSpacing(pool, gap1, gap2);
                var isFallback = !!shuffled.isFallback;
                var booksLabel = [];
                for (var bi = 0; bi < BOOK_ORDER.length; bi++) {
                    if (inSelected(BOOK_ORDER[bi]))
                        booksLabel.push(BOOKS_META[BOOK_ORDER[bi]].name);
                }
                var booksStr = booksLabel.join(", ");
                var displayTitle = title || "Bible Quiz Quoting Bee";
                var html = '<div class="no-print" style="margin-bottom:12px">';
                if (isFallback)
                    html +=
                        '<div class="warn">Warning: spacing constraints could not be fully satisfied - using basic shuffle. Try reducing gap values.</div>';
                html +=
                    '<div class="statbar"><span><strong>' +
                    shuffled.length +
                    "</strong> verses</span><span>Words: <strong>" +
                    minW +
                    "-" +
                    maxW +
                    "</strong></span><span>Gap i/i+1: <strong>min " +
                    gap1 +
                    "</strong></span><span>Gap i/i+2: <strong>min " +
                    gap2 +
                    "</strong></span></div>";
                html +=
                    '<button class="printbtn" onclick="window.print()">Print / Save PDF</button></div>';
                html += '<div class="ph">' + displayTitle + "</div>";
                html +=
                    '<div class="ph2">' +
                    booksStr +
                    " - New Living Translation</div>";
                html +=
                    '<table class="vtable"><thead><tr><th class="num">#</th><th style="width:145px">Reference</th><th>Verse Text (NLT)</th></tr></thead><tbody>';
                for (var si = 0; si < shuffled.length; si++) {
                    var sv = shuffled[si];
                    var text = sv.text.replace(/\[[a-zA-Z0-9]\]/g, "").trim();
                    var even =
                        si % 2 === 1 ? ' style="background:#faf8f4"' : "";
                    html +=
                        '<tr><td class="num"' +
                        even +
                        ">" +
                        (si + 1) +
                        '</td><td class="ref"' +
                        even +
                        ">" +
                        sv.ref +
                        "</td><td" +
                        even +
                        ">" +
                        text +
                        "</td></tr>";
                }
                html += "</tbody></table>";
                res.innerHTML = html;
                document.getElementById("printbtn").style.display =
                    "inline-block";
            }
            renderPresets();
            renderBooks();
        </script>
    </body>
</html>
